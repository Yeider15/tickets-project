spring.application.name=ticket

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ticket
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.example.ticket=DEBUG
# ========================================
# Configuración de Estrategias de Resiliencia
# ========================================
# Estrategia a utilizar: RETRY, CIRCUIT_BREAKER, NOOP
resilience.strategy=RETRY

# Configuración de Retry Strategy
resilience.retry.maxAttempts=3
resilience.retry.initialDelayMs=100
resilience.retry.backoffMultiplier=2.0

# Configuración de Circuit Breaker Strategy
resilience.circuitbreaker.failureThreshold=5
resilience.circuitbreaker.timeoutMs=30000